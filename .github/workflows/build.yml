name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: node scripts/build.js

      - name: Check dist output
        run: |
          test -f dist/index.html
          test -f dist/elaboracion.html
          test -f dist/config/site.js
          test -f dist/assets/albino.css
